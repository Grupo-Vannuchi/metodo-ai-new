# Local PostgreSQL and Evolution API for development.
# Usage:
#   docker compose up -d      # start
#   npm run db:migrate        # apply schema
#   npm run db:seed           # load seed (demo org + owner user)
services:
  postgres:
    image: postgres:17-alpine
    container_name: metodoai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: metodoai
      POSTGRES_PASSWORD: metodoai
      POSTGRES_DB: metodoai
    ports:
      # Host port is configurable to avoid clashing with a local Postgres.
      - "${DB_PORT:-5433}:5432"
    volumes:
      - metodoai-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metodoai -d metodoai"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: metodoai-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-evolution_metodoai_secret_key_2026}
      # A Evolution API pode usar o mesmo Postgres do SaaS para armazenar os dados das instâncias
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://metodoai:metodoai@postgres:5432/metodoai?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metodoai-evolution-instances:/evolution/instances

volumes:
  metodoai-pgdata:
  metodoai-evolution-instances:
